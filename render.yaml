services:
  - type: web
    name: lofselect-gescon-action
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.8
      - key: ACTION_API_KEY
        sync: false
      - key: SERPAPI_API_KEY
        sync: false
